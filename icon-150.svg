<svg width="150" height="150" viewBox="0 0 150 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- bg -->
  <rect width="150" height="150" rx="30" fill="#1F3A5F"/>
  <!-- soft glow -->
  <ellipse cx="75" cy="90" rx="52" ry="40" fill="#4F86C6" opacity="0.12"/>
  <!-- chimney -->
  <rect x="92" y="38" width="11" height="26" rx="2.5" fill="#3A6FAD"/>
  <rect x="90" y="36" width="15" height="5" rx="2" fill="#4F86C6"/>
  <!-- roof -->
  <polygon points="75,24 122,74 28,74" fill="#4F86C6"/>
  <!-- roof edge highlights -->
  <line x1="75" y1="24" x2="122" y2="74" stroke="#DCEAF7" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="75" y1="24" x2="28" y2="74" stroke="#DCEAF7" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- house body -->
  <rect x="34" y="72" width="82" height="54" rx="3" fill="#4F86C6"/>
  <!-- window left -->
  <rect x="42" y="82" width="18" height="16" rx="3" fill="#DCEAF7" opacity="0.9"/>
  <line x1="51" y1="82" x2="51" y2="98" stroke="#4F86C6" stroke-width="1.5"/>
  <line x1="42" y1="90" x2="60" y2="90" stroke="#4F86C6" stroke-width="1.5"/>
  <!-- window right -->
  <rect x="90" y="82" width="18" height="16" rx="3" fill="#DCEAF7" opacity="0.9"/>
  <line x1="99" y1="82" x2="99" y2="98" stroke="#4F86C6" stroke-width="1.5"/>
  <line x1="90" y1="90" x2="108" y2="90" stroke="#4F86C6" stroke-width="1.5"/>
  <!-- door -->
  <rect x="62" y="94" width="26" height="32" rx="5" fill="#1F3A5F"/>
  <!-- door arch -->
  <path d="M62 99 Q75 90 88 99" fill="#1F3A5F" stroke="#3A6FAD" stroke-width="1.5"/>
  <!-- door knob -->
  <circle cx="84" cy="111" r="2.5" fill="#B9B5E8"/>
  <!-- lavender heart at peak -->
  <path d="M75 19 C75 19 70.5 14 67 16 C63.5 18 65 22.5 75 27 C85 22.5 86.5 18 83 16 C79.5 14 75 19 75 19Z" fill="#B9B5E8"/>
</svg>
